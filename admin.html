<!DOCTYPE html>
<html>
<head>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="data.js"></script>
<script src="script.js"></script>

<style>

body{
    margin:0;
    font-family:Segoe UI;
    background:#f4f6f9;
}

.header{
    background:#1c2b3a;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
}

.container{
    padding:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

canvas{
    background:white;
    padding:20px;
    border-radius:10px;
}

table{
    width:100%;
    border-collapse:collapse;
}

td,th{
    padding:10px;
    border-bottom:1px solid #ddd;
}

</style>
</head>

<body onload="loadDashboard()">

<div class="header">
    <h2>Admin Dashboard</h2>
    <button onclick="logout()">Logout</button>
</div>

<div class="container">

<div class="grid">

<div class="card">
    <h3>Total Customer</h3>
    <h1 id="totalCustomer">0</h1>
</div>

<div class="card">
    <h3>Total Sales</h3>
    <h1 id="totalSales">0</h1>
</div>

<div class="card">
    <h3>Outstanding</h3>
    <h1 id="totalBalance">0</h1>
</div>

</div>

<br>

<canvas id="salesChart"></canvas>

<br><br>

<table id="table">
<thead>
<tr>
<th>Customer</th>
<th>Sales</th>
<th>Balance</th>
<th>Unit</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>

async function loadDashboard(){

    checkAuth("admin");

    const data = await getData();

    document.getElementById("totalCustomer").innerText = data.length;

    let sales = 0;
    let balance = 0;

    data.forEach(d=>{
        sales += d.sales;
        balance += d.balance;
    });

    document.getElementById("totalSales").innerText = sales;
    document.getElementById("totalBalance").innerText = balance;

    const tbody = document.querySelector("#table tbody");

    data.forEach(d=>{
        tbody.innerHTML += `
        <tr>
            <td>${d.customer}</td>
            <td>${d.sales}</td>
            <td>${d.balance}</td>
            <td>${d.unit}</td>
        </tr>`;
    });

    new Chart(document.getElementById("salesChart"), {
        type: "bar",
        data: {
            labels: data.map(x=>x.customer),
            datasets: [{
                label: "Sales",
                data: data.map(x=>x.sales)
            }]
        }
    });

}

</script>

</body>
</html>
