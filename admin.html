<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR PRO Pangkalan Bun | Dashboard Unit</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .sidebar-dark { background-color: #1a1c2e; }
        .stat-icon { width:48px; height:48px; border-radius:14px; display:flex; align-items:center; justify-content:center; }
        .rounded-super { border-radius:24px; }
    </style>
</head>

<body class="flex h-screen overflow-hidden text-slate-700">

<aside class="w-64 sidebar-dark text-slate-400 flex flex-col hidden lg:flex">
    <div class="p-6 flex items-center space-x-3">
        <div class="h-9 w-9 bg-indigo-500 rounded-lg flex items-center justify-center shadow-lg shadow-indigo-500/40">
            <i class="fas fa-chart-line text-white"></i>
        </div>
        <span class="text-white font-bold text-xl">AR Pangkalan Bun</span>
    </div>

    <nav class="flex-1 px-4 space-y-2 mt-4">
        <a href="#" class="flex items-center space-x-3 px-4 py-3 bg-indigo-600/10 text-indigo-400 border-r-4 border-indigo-600 font-semibold">
            <i class="fas fa-th-large"></i>
            <span>Dashboard Unit</span>
        </a>
    </nav>

    <div class="m-4 p-4 rounded-2xl bg-slate-800/40 border border-slate-700/50">
        <div class="flex items-center space-x-2 mb-1">
            <div id="statusDot" class="h-2 w-2 rounded-full bg-slate-500"></div>
            <span class="text-xs text-slate-300 font-medium">Status: <span id="syncStatus">Idle</span></span>
        </div>
        <p class="text-[10px] text-slate-500 ml-4">Terakhir: <span id="syncTime">-</span></p>
    </div>
</aside>

<main class="flex-1 flex flex-col overflow-hidden">
    <header class="h-20 bg-white border-b flex items-center justify-between px-8">
        <div>
            <h2 class="text-xl font-bold text-slate-800">Monitoring AR Unit</h2>
            <p id="updateTime" class="text-xs text-slate-500">Memuat data...</p>
        </div>
        <div class="flex items-center space-x-4">
            <button onclick="loadData()" class="h-10 w-10 rounded-full bg-indigo-600 text-white shadow-lg hover:rotate-180 transition-all duration-500">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
    </header>

    <div class="flex-1 overflow-y-auto p-8 space-y-8">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="bg-white p-6 rounded-super shadow-sm flex space-x-4">
                <div class="stat-icon bg-blue-50 text-blue-500"><i class="fas fa-wallet"></i></div>
                <div><p class="text-xs text-slate-400">Total O/S</p><h3 id="totalOS" class="text-2xl font-bold">Rp 0</h3></div>
            </div>
            <div class="bg-white p-6 rounded-super shadow-sm flex space-x-4">
                <div class="stat-icon bg-red-50 text-red-500"><i class="fas fa-clock"></i></div>
                <div><p class="text-xs text-slate-400">Overdue</p><h3 id="totalOverdue" class="text-2xl font-bold text-red-600">Rp 0</h3></div>
            </div>
            <div class="bg-white p-6 rounded-super shadow-sm flex space-x-4">
                <div class="stat-icon bg-amber-50 text-amber-500"><i class="fas fa-file-invoice"></i></div>
                <div><p class="text-xs text-slate-400">Case Overdue</p><h3 id="overdueCount" class="text-2xl font-bold">0</h3></div>
            </div>
            <div class="bg-white p-6 rounded-super shadow-sm flex space-x-4">
                <div class="stat-icon bg-emerald-50 text-emerald-500"><i class="fas fa-coins"></i></div>
                <div><p class="text-xs text-slate-400">Potensi Penalti</p><h3 id="totalPenalty" class="text-2xl font-bold">Rp 0</h3></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="bg-white p-8 rounded-super shadow-sm">
                <h4 class="font-bold mb-6">Metode Pembayaran (Outstanding)</h4>
                <div id="chartMetode"></div>
            </div>
            <div class="bg-white p-8 rounded-super shadow-sm">
                <h4 class="font-bold mb-6">Status Aging</h4>
                <div id="chartAging"></div>
            </div>
        </div>

        <div class="bg-white rounded-super shadow-sm overflow-hidden">
            <div class="px-8 py-6 border-b flex justify-between items-center">
                <h3 class="font-bold">Detail Data Unit</h3>
                <span id="loadCount" class="text-xs bg-indigo-100 text-indigo-600 px-3 py-1 rounded-full">0 Data</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-xs text-slate-400 uppercase">
                        <tr>
                            <th class="px-8 py-4">Customer</th>
                            <th class="px-8 py-4">Billing / SPK</th>
                            <th class="px-8 py-4 text-right">O/S Balance</th>
                            <th class="px-8 py-4 text-right">Overdue</th>
                            <th class="px-8 py-4 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="masterTable" class="text-sm">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<script>
// KONFIGURASI DATABASE PANGKALAN BUN
const SB_URL = "https://ahaoznkudusajtzfbnqj.supabase.co"; 
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFoYW96bmt1ZHVzYWp0emZibnFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMzQ0NTEsImV4cCI6MjA5MDgxMDQ1MX0.RbMEdiLooCsDKefdXnM_0jse63_C4sl1tWQ5BfWVU1s";

const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

let fullData = [];
let chartMetodeObj, chartAgingObj;

async function loadData() {
    const statusDot = document.getElementById("statusDot");
    const syncStatus = document.getElementById("syncStatus");
    
    syncStatus.textContent = "Syncing...";
    statusDot.className = "h-2 w-2 rounded-full bg-amber-500 animate-pulse";

    try {
        // Tarik data dari tabel ar_unit
        const { data, error } = await supabaseClient
            .from("ar_unit")
            .select("*");

        if (error) throw error;

        fullData = data || [];
        renderDashboard(fullData);

        syncStatus.textContent = "Connected";
        statusDot.className = "h-2 w-2 rounded-full bg-emerald-500";
        document.getElementById("syncTime").textContent = new Date().toLocaleTimeString("id-ID");
        document.getElementById("loadCount").textContent = `${fullData.length} Data AR`;
        
    } catch (err) {
        console.error("Gagal Tarik Data:", err.message);
        syncStatus.textContent = "Error Access";
        statusDot.className = "h-2 w-2 rounded-full bg-red-500";
    }
}

function renderDashboard(data) {
    let tOS = 0, tOvd = 0, tPnl = 0, ovdCount = 0;
    let metodeMap = {}, agingMap = {};

    const tableBody = document.getElementById("masterTable");
    tableBody.innerHTML = "";

    data.forEach(item => {
        // PENCOCOKAN KOLOM (Huruf Kapital sesuai Database Anda)
        const osVal = Number(item.Os_Balance) || 0;
        const ovdVal = Number(item.Total_Overdue) || 0;
        const pnlVal = Number(item.Penalty_Amount) || 0;

        tOS += osVal;
        tOvd += ovdVal;
        tPnl += pnlVal;
        if (ovdVal > 0) ovdCount++;

        // Mapping Chart
        const metode = item.Metode_Pembayaran || "Lainnya";
        met
