<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AR Dashboard Pro</title>

<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{margin:0;font-family:Segoe UI;background:#f1f5f9}
.sidebar{
  width:220px;height:100vh;position:fixed;
  background:#0f172a;color:#fff;padding:20px
}
.sidebar h2{font-size:16px}
.menu{margin-top:20px}
.menu div{
  padding:10px;border-radius:8px;cursor:pointer
}
.menu div:hover{background:#1e293b}

.main{margin-left:240px;padding:20px}

.tabs button{
  margin-right:10px;padding:8px 15px;
  border:none;border-radius:20px;cursor:pointer
}

.active{background:#1e40af;color:#fff}

.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px}
.card{
  background:#fff;padding:15px;border-radius:10px;
  box-shadow:0 3px 8px rgba(0,0,0,0.1)
}

.row{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-top:20px}

.box{
  background:#fff;padding:15px;border-radius:10px;
}

table{
  width:100%;background:#fff;margin-top:20px;
  border-collapse:collapse;font-size:13px
}
th{background:#1e293b;color:#fff;padding:10px}
td{padding:10px;border-bottom:1px solid #eee}

.red{color:red;font-weight:bold}
.green{color:green}
</style>
</head>

<body>

<div class="sidebar">
  <h2>AUTO2000</h2>
  <div class="menu">
    <div onclick="showTab('ringkasan')">Dashboard Unit</div>
    <div onclick="showTab('database')">Data AR Unit</div>
  </div>
</div>

<div class="main">

<h2>Overview AR Unit</h2>

<div class="tabs">
  <button onclick="showTab('ringkasan')" class="active">Ringkasan</button>
  <button onclick="showTab('leasing')">Leasing</button>
  <button onclick="showTab('overdue')">Overdue</button>
  <button onclick="showTab('database')">Database</button>
</div>

<!-- ================= RINGKASAN ================= -->
<div id="ringkasan">

<div id="kpi" class="grid"></div>

<div class="row">
  <div class="box">
    <h4>Aging</h4>
    <div id="chartAging"></div>
  </div>

  <div class="box">
    <h4>Leasing Composition</h4>
    <div id="chartLeasing"></div>
  </div>
</div>

<div class="row">
  <div class="box">
    <h4>Top Sales</h4>
    <div id="topSales"></div>
  </div>

  <div class="box">
    <h4>Top Overdue</h4>
    <div id="topOverdue"></div>
  </div>
</div>

</div>

<!-- ================= LEASING ================= -->
<div id="leasing" style="display:none">
  <div id="leasingChart"></div>
</div>

<!-- ================= OVERDUE ================= -->
<div id="overdue" style="display:none">
  <table id="overdueTable"></table>
</div>

<!-- ================= DATABASE ================= -->
<div id="database" style="display:none">
  <table id="fullTable"></table>
</div>

</div>

<script>
const supabase = supabase.createClient("YOUR_URL","YOUR_KEY");

let DATA=[];

// ================= LOAD DATA =================
async function load(){
  let {data} = await supabase.from("ar_data").select("*");
  DATA = data;

  renderKPI();
  renderCharts();
  renderTop();
  renderTables();
}

// ================= KPI =================
function renderKPI(){
  let os = DATA.reduce((a,b)=>a+b.os_balance,0);
  let od = DATA.reduce((a,b)=>a+b.total_overdue,0);
  let pen = DATA.reduce((a,b)=>a+(b.penalty_amount||0),0);
  let lancar = DATA.reduce((a,b)=>a+(b.lancar||0),0);

  document.getElementById("kpi").innerHTML = `
  <div class="card">Total OS<br><b>${os}</b></div>
  <div class="card">Overdue<br><b class="red">${od}</b></div>
  <div class="card">Penalty<br>${pen}</div>
  <div class="card">Lancar<br class="green">${lancar}</div>
  `;
}

// ================= CHART =================
function renderCharts(){

  new ApexCharts(document.querySelector("#chartAging"),{
    chart:{type:'bar'},
    series:[{
      data:[
        sum('lancar'),
        sum('hari_1_30'),
        sum('hari_31_60'),
        sum('lebih_60_hari')
      ]
    }],
    xaxis:{categories:['Lancar','1-30','31-60','>60']}
  }).render();

  let leasingGroup = groupBy('leasing_name');

  new ApexCharts(document.querySelector("#chartLeasing"),{
    chart:{type:'donut'},
    series:Object.values(leasingGroup),
    labels:Object.keys(leasingGroup)
  }).render();
}

// ================= TOP =================
function renderTop(){

  let sales = groupBy('salesman_name');
  let topSales = Object.entries(sales).sort((a,b)=>b[1]-a[1]).slice(0,5);

  document.getElementById("topSales").innerHTML =
    topSales.map(x=>`${x[0]} : ${x[1]}`).join("<br>");

  let overdue = [...DATA].sort((a,b)=>b.total_overdue-a.total_overdue).slice(0,5);

  document.getElementById("topOverdue").innerHTML =
    overdue.map(x=>`${x.customer_name} : ${x.total_overdue}`).join("<br>");
}

// ================= TABLE =================
function renderTables(){

  document.getElementById("fullTable").innerHTML =
    "<tr><th>Customer</th><th>Sales</th><th>OS</th><th>Overdue</th></tr>" +
    DATA.map(x=>`
      <tr>
        <td>${x.customer_name}</td>
        <td>${x.salesman_name}</td>
        <td>${x.os_balance}</td>
        <td class="${x.total_overdue>0?'red':''}">${x.total_overdue}</td>
      </tr>
    `).join("");

  document.getElementById("overdueTable").innerHTML =
    "<tr><th>Customer</th><th>Overdue</th></tr>" +
    DATA.filter(x=>x.total_overdue>0).map(x=>`
      <tr>
        <td>${x.customer_name}</td>
        <td class="red">${x.total_overdue}</td>
      </tr>
    `).join("");
}

// ================= HELPER =================
function sum(field){
  return DATA.reduce((a,b)=>a+(b[field]||0),0);
}

function groupBy(field){
  let obj={};
  DATA.forEach(x=>{
    let key=x[field]||'Unknown';
    obj[key]=(obj[key]||0)+x.os_balance;
  });
  return obj;
}

// ================= TAB =================
function showTab(id){
  ['ringkasan','leasing','overdue','database'].forEach(x=>{
    document.getElementById(x).style.display='none';
  });
  document.getElementById(id).style.display='block';
}

load();
</script>

</body>
</html>
