<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR PRO v3 - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50">

    <div class="p-8 space-y-8">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-xs font-bold text-slate-400 uppercase">Total O/S</p>
                <h2 id="totalOS" class="text-2xl font-black text-slate-800 mt-2">Rp 0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-xs font-bold text-slate-400 uppercase text-rose-600">Total Overdue</p>
                <h2 id="totalOverdue" class="text-2xl font-black text-rose-600 mt-2">Rp 0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-xs font-bold text-slate-400 uppercase">Overdue Case</p>
                <h2 id="overdueCount" class="text-2xl font-black text-slate-800 mt-2">0</h2>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                <p class="text-xs font-bold text-slate-400 uppercase">Total Penalty</p>
                <h2 id="totalPenalty" class="text-2xl font-black text-slate-800 mt-2">Rp 0</h2>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="p-6 border-b border-slate-50 flex justify-between items-center">
                <h3 class="font-bold text-slate-700">Master Data Detail</h3>
                <span id="syncTime" class="text-[10px] bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full font-bold uppercase">Loading...</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50/50 text-[10px] uppercase tracking-wider text-slate-400">
                        <tr>
                            <th class="px-8 py-4 font-bold">Nama Konsumen</th>
                            <th class="px-8 py-4 font-bold">Model Unit</th>
                            <th class="px-8 py-4 font-bold text-right">Outstanding</th>
                            <th class="px-8 py-4 font-bold text-right">Overdue</th>
                            <th class="px-8 py-4 font-bold text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="masterTable" class="divide-y divide-slate-50">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Konfigurasi Supabase Bapak (Sesuai Gambar 1)
        const SB_URL = 'https://hnefaswbhaclsvtojmlk.supabase.co';
        const SB_KEY = 'sb_publishable_Z3HCV9sEiJfcisoht1FaMw_rLMlrIUB'; 
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function loadData() {
            try {
                // Tarik data dari tabel ar_unit
                const { data, error } = await supabaseClient.from('ar_unit').select('*');
                if (error) throw error;
                
                renderDashboard(data);

                if(document.getElementById('syncTime')) {
                    document.getElementById('syncTime').textContent = data.length + ' Consumers Loaded';
                }
            } catch (err) {
                console.error("Error:", err.message);
            }
        }

        function renderDashboard(data) {
            let stats = { os: 0, ovd: 0, penalty: 0, count: 0 };
            const tableBody = document.getElementById('masterTable');
            tableBody.innerHTML = '';

            data.forEach(item => {
                // Pemetaan Kolom Database (Sesuai Gambar 16)
                const osVal = parseFloat(item.os_balance) || 0;
                const ovdVal = parseFloat(item.total_overdue) || 0;
                const pnlVal = parseFloat(item.Penalty_Amount) || 0;
                const status = item.Status_Aging || 'Lancar';

                stats.os += osVal;
                stats.ovd += ovdVal;
                stats.penalty += pnlVal;
                if (ovdVal > 0) stats.count++;

                tableBody.insertAdjacentHTML('beforeend', `
                    <tr class="hover:bg-slate-50/50 transition-colors">
                        <td class="px-8 py-4 font-bold text-slate-700">${item.Customer_Name || '-'}</td>
                        <td class="px-8 py-4 text-slate-500 text-sm">${item.Material_Code || '-'}</td>
                        <td class="px-8 py-4 text-right font-bold text-slate-700">${formatIDR(osVal)}</td>
                        <td class="px-8 py-4 text-right font-bold text-rose-600">${formatIDR(ovdVal)}</td>
                        <td class="px-8 py-4 text-center">
                            <span class="px-3 py-1 rounded-full text-[10px] font-black ${status === 'Lancar' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}">
                                ${status.toUpperCase()}
                            </span>
                        </td>
                    </tr>
                `);
            });

            // Update Angka Kartu
            document.getElementById('totalOS').textContent = formatIDR(stats.os);
            document.getElementById('totalOverdue').textContent = formatIDR(stats.ovd);
            document.getElementById('totalPenalty').textContent = formatIDR(stats.penalty);
            document.getElementById('overdueCount').textContent = stats.count;
        }

        function formatIDR(val) {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(val);
        }

        window.onload = loadData;
    </script>
</body>
</html>
