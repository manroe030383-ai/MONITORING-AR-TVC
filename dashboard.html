<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard AR Unit - Auto2000</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; }
        
        /* Efek Card 3D Premium */
        .card-3d {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-bottom: 4px solid #E2E8F0;
            position: relative;
        }
        .card-3d:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
            border-bottom: 4px solid #EF4444; /* Warna merah saat hover */
        }
        .card-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.02); }
    </style>
</head>
<body class="p-8">

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        
        <div class="bg-white p-6 rounded-[24px] card-3d card-shadow border border-slate-100">
            <p class="text-[10px] font-bold text-slate-400 uppercase mb-3 tracking-widest">TOTAL O/S</p>
            <h3 id="total-os" class="text-2xl font-black text-[#1B2559]">Rp 0</h3>
            <div class="mt-5 flex h-1.5 w-full rounded-full bg-slate-100 overflow-hidden">
                <div id="bar-cash" class="bg-emerald-500" style="width: 0%"></div>
                <div id="bar-leasing" class="bg-blue-600" style="width: 0%"></div>
            </div>
            <div class="flex justify-between mt-3 text-[9px] font-black uppercase">
                <span class="text-emerald-500">CASH</span>
                <span class="text-blue-600">LEASING</span>
            </div>
        </div>

        <div class="bg-white p-6 rounded-[24px] card-3d card-shadow border border-slate-100">
            <div class="absolute top-6 right-6 text-red-500 bg-red-50 p-2 rounded-xl border border-red-100">⚠️</div>
            <p class="text-[10px] font-bold text-slate-400 uppercase mb-3 tracking-widest">TOTAL OVERDUE</p>
            <h3 id="total-overdue" class="text-2xl font-black text-red-600">Rp 0</h3>
            <div class="mt-4">
                <span id="count-overdue-spk" class="text-[10px] font-black text-red-500 bg-red-50 px-3 py-1.5 rounded-lg border border-red-100 uppercase">
                    0 SPK LEWAT TOP
                </span>
            </div>
        </div>

        <div class="bg-white p-6 rounded-[24px] card-3d card-shadow border border-slate-100">
            <div class="absolute top-6 right-6 text-orange-500 bg-orange-50 p-2 rounded-xl border border-orange-100">💰</div>
            <p class="text-[10px] font-bold text-slate-400 uppercase mb-3 tracking-widest">POTENSI PENALTI</p>
            <h3 id="total-penalty" class="text-2xl font-black text-[#1B2559]">Rp 0</h3>
            <div class="mt-4">
                <p id="count-penalty-spk" class="text-[10px] text-slate-400 font-bold uppercase tracking-tight">DARI 0 SPK</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-[24px] card-3d card-shadow border border-slate-100">
            <div class="absolute top-6 right-6 text-emerald-500 bg-emerald-50 p-2 rounded-xl border border-emerald-100">✅</div>
            <p class="text-[10px] font-bold text-slate-400 uppercase mb-3 tracking-widest">BELUM JATUH TEMPO</p>
            <h3 id="total-lancar" class="text-2xl font-black text-emerald-600">Rp 0</h3>
            <div class="mt-4">
                <p class="text-[10px] text-emerald-500 font-bold uppercase tracking-tight">O/S LANCAR</p>
            </div>
        </div>

    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
