<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoring Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Inter', sans-serif; }
        .chart-container { position: relative; height: 250px; width: 100%; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 lg:col-span-1">
            <h3 class="text-gray-700 font-bold mb-6">Aging Analysis (Umur Piutang)</h3>
            <div class="chart-container">
                <canvas id="agingChart"></canvas>
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 lg:col-span-2">
            <h3 class="text-gray-700 font-bold mb-6">Komposisi & Breakdown Penjualan</h3>
            
            <div class="flex flex-col md:flex-row items-center gap-8">
                <div class="w-full md:w-1/3 chart-container" style="height: 200px;">
                    <canvas id="komposisiChart"></canvas>
                </div>

                <div class="w-full md:w-2/3 space-y-4">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div class="bg-emerald-50 border border-emerald-100 p-4 rounded-2xl">
                            <p class="text-[10px] font-bold text-emerald-600 uppercase tracking-wider">Total Cash</p>
                            <p class="text-xl font-bold text-gray-800 my-1">Rp 24.437.238.000</p>
                            <p class="text-[11px] text-gray-500">52.4% dari Total | <span class="font-bold text-emerald-600">55 Unit</span></p>
                        </div>
                        <div class="bg-blue-50 border border-blue-100 p-4 rounded-2xl">
                            <p class="text-[10px] font-bold text-blue-600 uppercase tracking-wider">Total Leasing</p>
                            <p class="text-xl font-bold text-gray-800 my-1">Rp 22.204.815.407</p>
                            <p class="text-[11px] text-gray-500">47.6% dari Total | <span class="font-bold text-blue-600">90 Unit</span></p>
                        </div>
                    </div>

                    <div class="pt-2">
                        <p class="text-[10px] font-bold text-gray-400 uppercase mb-3">Top Leasing Breakdown</p>
                        
                        <div class="mb-3">
                            <div class="flex justify-between text-[11px] mb-1">
                                <span class="font-bold text-gray-700">ACC</span>
                                <span class="text-gray-400">30.2% <b class="text-gray-700 ml-2">14084.2 Jt</b></span>
                            </div>
                            <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
                                <div class="bg-blue-500 h-full" style="width: 30.2%"></div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <div class="flex justify-between text-[11px] mb-1">
                                <span class="font-bold text-gray-700">TAFS</span>
                                <span class="text-gray-400">15.0% <b class="text-gray-700 ml-2">7008.2 Jt</b></span>
                            </div>
                            <div class="w-full bg-gray-100 h-2 rounded-full overflow-hidden">
                                <div class="bg-blue-400 h-full" style="width: 15%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
