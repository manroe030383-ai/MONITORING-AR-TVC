<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - Overview AR Unit</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <div class="bg-gradient-to-r from-blue-900 to-blue-700 bg-[#1e40af] text-white px-6 py-4 flex justify-between items-center shadow-lg">
        <h1 class="text-2xl font-bold tracking-wide">AUTO2000 - Admin Control</h1>
        <button class="bg-white text-blue-600 px-4 py-2 rounded-md font-medium text-sm hover:bg-gray-100 transition-all shadow-sm">
            Logout
        </button>
    </div>

    <div class="p-6 space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-100 flex flex-col justify-between min-h-[140px]">
                <span class="text-sm font-bold text-gray-800 tracking-tight">Total Outstanding</span>
                <span class="text-4xl font-extrabold text-black mt-4" id="total-outstanding">Rp 0</span>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-100 flex flex-col justify-between min-h-[140px]">
                <span class="text-sm font-bold text-gray-800 tracking-tight">PAID</span>
                <span class="text-4xl font-extrabold text-black mt-4" id="total-paid">0 Unit</span>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-100 flex flex-col justify-between min-h-[140px]">
                <span class="text-sm font-bold text-gray-800 tracking-tight">On Proses</span>
                <span class="text-4xl font-extrabold text-black mt-4" id="total-on-proses">0 Unit</span>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-100 flex flex-col justify-between min-h-[140px]">
                <span class="text-sm font-bold text-gray-800 tracking-tight">Overdue</span>
                <span class="text-4xl font-extrabold text-red-600 mt-4" id="total-overdue">0 Unit</span>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-4 flex items-center">
            <p class="text-xs font-bold uppercase tracking-wider text-emerald-600 italic" id="status-update">Memuat data Admin dari Supabase...</p>
        </div>

        <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-4 overflow-hidden">
            <div class="grid grid-cols-9 bg-[#2563eb] text-white rounded-lg text-center font-semibold text-xs shadow-sm overflow-hidden py-3">
                <div class="px-1">No</div>
                <div class="px-1">Customer Name</div>
                <div class="px-1">Leasing</div>
                <div class="px-1">O/S Balance</div>
                <div class="px-1">Material Code</div>
                <div class="px-1">Ket Cabang</div>
                <div class="px-1">Plan Bayar Leasing</div>
                <div class="px-1">Keterangan Leasing</div>
                <div class="px-1">Aksi</div>
            </div>
            
            <div id="admin-table-body" class="divide-y divide-gray-100 max-h-[500px] overflow-y-auto mt-2">
            </div>
        </div>

    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const SUPABASE_URL = 'https://ahaoznkudusajtzfbnqj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFoYW96bmt1ZHVzYWp0emZibnFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMzQ0NTEsImV4cCI6MjA5MDgxMDQ1MX0.RbMEdiLooCsDKefdXnM_0jse63_C4sl1tWQ5BfWVU1s';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        window.cachedData = [];

        const fmtIDR = (v) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(v || 0);

        async function fetchAdminData() {
            try {
                const { data, error } = await supabase.from('ar_unit').select('*');
                if (error) throw error;

                if (data) {
                    window.cachedData = data;
                    
                    let adminMetrics = { os: 0, paid: 0, onProses: 0, overdue: 0 };
                    let htmlRows = '';
                    let nomorUrut = 1;

                    data.forEach((d, i) => {
                        const leasing = String(d.leasing || d.leasing_name || d.Leasing || d['Leasing Name'] || '-');
                        const os = Number(d.os_balance || d.balance || d['O/S Balance'] || d['os'] || 0);
                        
                        const ov1 = Number(d.Hari_1_30 || d['Hari 1-30'] || 0);
                        const ov2 = Number(d.Hari_31_60 || d['Hari 31-60'] || 0);
                        const ov3 = Number(d.lebih_60_hari || d['Lebih 60 Hari'] || d['> 60 Hari'] || 0);
                        const totalOv = Number(d.total_overdue || d.overdue || 0);
                        const isOverdue = (ov1 + ov2 + ov3 + totalOv) > 0;

                        const statusTagih = String(d.status_tagih || d.status || d.Status || d.status_pembayaran || '').toUpperCase().trim();
                        
                        const customerName = d['Customer name'] || d.customer_name || d.customer || d.Customer || '-';
                        const materialCode = d['Material Code'] || d.material_code || d.material || '-';
                        
                        // Menampilkan data bertipe text dari database secara aman
                        const valKetCabang = d.ket_cabang !== null && d.ket_cabang !== undefined ? String(d.ket_cabang) : '';
                        const valPlanBayar = d.plan_bayar_leasing !== null && d.plan_bayar_leasing !== undefined ? String(d.plan_bayar_leasing) : '';
                        const valKetLeasing = d.ket_leasing !== null && d.ket_leasing !== undefined ? String(d.ket_leasing) : '';

                        const uiId = i;

                        // Hitung Metrik Global Admin
                        if (statusTagih === 'SUDAH GI' || statusTagih === 'PAID' || os === 0) {
                            adminMetrics.paid++;
                        } else {
                            adminMetrics.os += os;
                            if (isOverdue) {
                                adminMetrics.overdue++;
                            } else {
                                adminMetrics.onProses++;
                            }
                        }

                        // Tampilkan Semua Data Tanpa Filter (Admin Utama)
                        htmlRows += `
                        <div class="grid grid-cols-9 text-center py-3 text-xs font-bold uppercase text-gray-700 hover:bg-gray-50 items-center border-b border-gray-100">
                            <div class="text-gray-400 font-mono">${nomorUrut++}</div>
                            <div class="truncate px-2 text-left font-black text-slate-800">${customerName}</div>
                            <div class="px-1 text-blue-600 font-extrabold text-[11px]">${leasing}</div>
                            <div class="text-blue-600 font-black">${fmtIDR(os)}</div>
                            <div class="text-gray-500 font-mono text-[11px]">${materialCode}</div>
                            <div class="px-1">
                                <input type="text" id="cabang-${uiId}" data-customer="${customerName}" data-no="${d.No || d.no || ''}" data-id="${d.id || ''}" value="${valKetCabang}" placeholder="Ket cabang..." class="w-full text-[11px] p-1.5 border border-gray-200 rounded-md bg-white font-medium focus:outline-none focus:border-blue-500">
                            </div>
                            <div class="px-1">
                                <input type="text" id="plan-${uiId}" value="${valPlanBayar}" placeholder="Isi plan..." class="w-full text-[11px] p-1.5 border border-gray-200 rounded-md bg-white font-medium focus:outline-none focus:border-blue-500">
                            </div>
                            <div class="px-1">
                                <input type="text" id="ket-${uiId}" value="${valKetLeasing}" placeholder="Isi keterangan..." class="w-full text-[11px] p-1.5 border border-gray-200 rounded-md bg-white font-medium focus:outline-none focus:border-blue-500">
                            </div>
                            <div class="text-center">
                                <button onclick="simpanCatatanAdmin('${uiId}')" class="text-blue-600 hover:bg-blue-600 hover:text-white bg-blue-50 p-2 rounded-lg transition-all" title="Simpan Catatan">💾</button>
                            </div>
                        </div>`;
                    });

                    if(document.getElementById('total-outstanding')) document.getElementById('total-outstanding').innerText = fmtIDR(adminMetrics.os);
                    if(document.getElementById('total-paid')) document.getElementById('total-paid').innerText = `${adminMetrics.paid} Unit`;
                    if(document.getElementById('total-on-proses')) document.getElementById('total-on-proses').innerText = `${adminMetrics.onProses} Unit`;
                    if(document.getElementById('total-overdue')) document.getElementById('total-overdue').innerText = `${adminMetrics.overdue} Unit`;

                    const tableBody = document.getElementById('admin-table-body');
                    if(tableBody) {
                        tableBody.innerHTML = htmlRows ? htmlRows : '<div class="text-center py-8 text-gray-400 text-xs font-bold">TIDAK ADA DATA PIUTANG</div>';
                    }

                    if (document.getElementById('status-update')) {
                        document.getElementById('status-update').innerText = `DASHBOARD ADMIN SINKRON: ${new Date().toLocaleString('id-ID')} WIB`;
                    }
                }
            } catch (err) {
                console.error("Gagal memuat data admin:", err);
            }
        }

        // FUNGSI LOCKING UI KHUSUS DI ADMIN UTAMA AGAR AMAN SAAT SAVE
        window.simpanCatatanAdmin = async function(uiId) {
            const inputCabang = document.getElementById(`cabang-${uiId}`);
            const inputPlan = document.getElementById(`plan-${uiId}`);
            const inputKet = document.getElementById(`ket-${uiId}`);

            const customerName = inputCabang.getAttribute('data-customer');
            const dataNo = inputCabang.getAttribute('data-no');
            const dataId = inputCabang.getAttribute('data-id');

            const valCabang = inputCabang.value;
            const valPlan = inputPlan.value;
            const valKet = inputKet.value;

            try {
                // Kunci teks di layar komputer admin agar tidak hilang/kosong sewaktu proses kirim data
                inputCabang.setAttribute('value', valCabang);
                inputPlan.setAttribute('value', valPlan);
                inputKet.setAttribute('value', valKet);

                let payload = {
                    ket_cabang: valCabang,
                    plan_bayar_leasing: valPlan,
                    ket_leasing: valKet
                };

                let queryBuilder = supabase.from('ar_unit').update(payload);

                if (dataId && dataId !== "") {
                    queryBuilder = queryBuilder.eq('id', dataId);
                } else if (dataNo && dataNo !== "") {
                    queryBuilder = queryBuilder.eq('No', Number(dataNo));
                } else {
                    queryBuilder = queryBuilder.or(`customer_name.eq."${customerName}", "Customer name".eq."${customerName}"`);
                }

                const { error } = await queryBuilder;
                if (error) throw error;
                
                alert("Data Berhasil Disimpan dari Dashboard Admin Utama! 👍");
                
                // Ambil data background diam-diam tanpa merusak form ketikan aktif
                const { data: freshData } = await supabase.from('ar_unit').select('*');
                if (freshData) window.cachedData = freshData;

            } catch (err) {
                console.error(err);
                alert("Gagal menyimpan data admin: " + err.message);
            }
        }

        document.addEventListener('DOMContentLoaded', fetchAdminData);
    </script>
</body>
</html>
