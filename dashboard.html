<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AR Monitoring System</title>

<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; background:#eef1f5; margin:0; }
.header { background:#1e293b; color:#fff; padding:15px; }
.container { padding:20px; }
.grid { display:grid; grid-template-columns: repeat(4,1fr); gap:10px; }
.card { background:#fff; padding:15px; border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
table { width:100%; margin-top:20px; background:#fff; border-collapse: collapse; }
th, td { padding:10px; border-bottom:1px solid #ddd; }
.status-red { color:red; font-weight:bold; }
.status-green { color:green; }
</style>
</head>

<body>

<div class="header">
AR Monitoring System
</div>

<div class="container">

<div id="kpi" class="grid"></div>

<div id="chart"></div>

<input id="search" placeholder="Cari customer..." onkeyup="loadData()">

<table>
<thead>
<tr>
<th>Customer</th>
<th>Sales</th>
<th>Leasing</th>
<th>OS</th>
<th>Overdue</th>
<th>Status Leasing</th>
<th>Unit</th>
</tr>
</thead>

<tbody id="table-body"></tbody>
</table>

</div>

<script>
const supabase = supabase.createClient("YOUR_URL","YOUR_KEY");

let role = null;

// DETECT USER
async function init(){
  let { data } = await supabase.auth.getUser();
  let email = data.user.email;

  if(email.includes("acc") || email.includes("tafs")) role="leasing";
  else if(email.includes("dealer")) role="sales";
  else role="admin";

  loadData();
  realtime();
}

// LOAD DATA
async function loadData(){
  let { data } = await supabase.from("ar_data").select("*");

  let keyword = document.getElementById("search").value || "";
  data = data.filter(x=>x.customer_name.toLowerCase().includes(keyword.toLowerCase()));

  renderKPI(data);
  renderChart(data);
  renderTable(data);
}

// KPI
function renderKPI(data){
  let os = data.reduce((a,b)=>a+b.os_balance,0);
  let od = data.reduce((a,b)=>a+b.total_overdue,0);

  document.getElementById("kpi").innerHTML = `
    <div class="card">Total OS<br>${os}</div>
    <div class="card">Overdue<br>${od}</div>
    <div class="card">Jumlah Data<br>${data.length}</div>
    <div class="card">Risk Level<br>${od>0?'HIGH':'SAFE'}</div>
  `;
}

// CHART
function renderChart(data){
  let chart = new ApexCharts(document.querySelector("#chart"), {
    chart:{ type:'bar' },
    series:[{ data:data.map(x=>x.total_overdue) }],
    xaxis:{ categories:data.map(x=>x.customer_name) }
  });
  chart.render();
}

// TABLE
function renderTable(data){
  let html="";

  data.forEach(row=>{
    html+=`
    <tr>
      <td>${row.customer_name}</td>
      <td>${row.salesman_name}</td>
      <td>${row.leasing_name}</td>
      <td>${row.os_balance}</td>
      <td class="${row.total_overdue>0?'status-red':'status-green'}">${row.total_overdue}</td>

      <td>
        ${role==="leasing" ? `
          <select id="l_${row.no_billing}">
            <option>Pending</option>
            <option>Process</option>
            <option>Approved</option>
            <option>Reject</option>
            <option>Paid</option>
          </select>
          <button onclick="updateLeasing('${row.no_billing}')">✔</button>
        ` : 'View'}
      </td>

      <td>
        ${role==="sales" ? `
          <select id="u_${row.no_spk}">
            <option>On Delivery</option>
            <option>In Transit</option>
            <option>Arrived</option>
          </select>
          <button onclick="updateUnit('${row.no_spk}')">✔</button>
        ` : 'View'}
      </td>
    </tr>`;
  });

  document.getElementById("table-body").innerHTML=html;
}

// UPDATE
async function updateLeasing(bill){
  let status = document.getElementById(`l_${bill}`).value;
  await supabase.from("leasing_updates").insert({no_billing:bill, leasing_status:status});
}

async function updateUnit(spk){
  let status = document.getElementById(`u_${spk}`).value;
  await supabase.from("unit_tracking").insert({no_spk:spk, unit_status:status});
}

// REALTIME
function realtime(){
  supabase.channel('realtime')
    .on('postgres_changes',{event:'*',schema:'public',table:'ar_data'},loadData)
    .subscribe();
}

init();
</script>

</body>
</html>
