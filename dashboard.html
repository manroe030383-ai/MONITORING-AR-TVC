<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overview AR Unit - Auto2000 Pangkalan Bun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .card-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04); }
        .nav-active { background-color: #1B2559 !important; color: white !important; }
        .box-total { border-radius: 12px; padding: 12px; }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen flex text-[#1B2559]">

    <aside class="w-64 bg-[#0B1324] text-slate-400 hidden lg:flex flex-col p-6 sticky top-0 h-screen">
        <div class="flex items-center gap-3 mb-10">
            <div class="bg-red-600 text-white w-9 h-9 rounded-lg flex items-center justify-center font-bold">A</div>
            <div>
                <h1 class="text-white font-bold text-xs uppercase">Auto2000</h1>
                <p class="text-[8px] uppercase tracking-widest text-slate-500">Pangkalan Bun</p>
            </div>
        </div>
        <nav class="space-y-1">
            <a href="#" class="flex items-center gap-3 p-3 bg-red-600 text-white rounded-xl text-xs font-bold shadow-lg">📊 Dashboard Unit</a>
        </nav>
    </aside>

    <main class="flex-1 p-6 overflow-x-hidden">
        <div class="flex justify-between items-start mb-6">
            <h2 class="text-2xl font-extrabold tracking-tight">Overview AR Unit</h2>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-5 rounded-2xl border border-slate-100 card-shadow">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-2">Total O/S Balance</p>
                <h3 id="total-os" class="text-xl font-black">Rp 0</h3>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-slate-100 card-shadow">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-2">Total Overdue</p>
                <h3 id="total-overdue" class="text-xl font-black text-red-600">Rp 0</h3>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-slate-100 card-shadow">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-2">Potensi Penalti</p>
                <h3 id="total-penalty" class="text-xl font-black text-orange-500">Rp 0</h3>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-slate-100 card-shadow">
                <p class="text-[9px] font-bold text-slate-400 uppercase mb-2">Belum Jatuh Tempo</p>
                <h3 id="total-lancar" class="text-xl font-black text-emerald-500">Rp 0</h3>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
            <div class="bg-white p-6 rounded-2xl border border-slate-100 card-shadow lg:col-span-3">
                <div class="grid grid-cols-1 md:grid-cols-12 gap-8 items-center">
                    <div class="md:col-span-4"><div id="chart-donut-leasing"></div></div>
                    <div class="md:col-span-8">
                        <div id="leasing-list" class="space-y-4"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
            <div class="bg-white p-5 rounded-2xl border border-slate-100 card-shadow">
                <h4 class="text-[10px] font-bold text-slate-400 uppercase mb-4">🏆 Top Sales O/S</h4>
                <div id="list-sales" class="space-y-4"></div>
            </div>

            <div class="bg-white p-5 rounded-2xl border border-slate-100 card-shadow">
                <h4 class="text-[10px] font-bold text-blue-500 uppercase mb-4">📊 Breakdown Leasing TVC</h4>
                <div id="tvc-detail-list" class="space-y-2 text-center">
                    <p id="total-unit-tvc" class="text-2xl font-black">0 Unit</p>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl border border-slate-100 card-shadow">
                <h4 class="text-[10px] font-bold text-red-500 uppercase mb-4">⚠️ Top 5 Overdue</h4>
                <div id="list-overdue" class="space-y-4"></div>
            </div>

            <div class="bg-white p-5 rounded-2xl border border-slate-100 card-shadow">
                <div class="flex items-center gap-3 mb-4">
                    <div class="bg-purple-50 p-2 rounded-lg text-lg">🏢</div>
                    <div>
                        <h4 class="text-[11px] font-extrabold text-[#1B2559] uppercase">Top SPV AR Distribution</h4>
                        <p class="text-[9px] text-slate-400 font-medium italic">Kontribusi O/S per Supervisor</p>
                    </div>
                </div>
                <div id="list-spv" class="space-y-6">
                    </div>
            </div>
        </div>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
