<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Overview AR Unit - Pangkalan Bun</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Public Sans', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        /* Hide scrollbar but keep functionality */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-[#F4F7FE]">
    <div class="flex min-h-screen">
        
        <aside class="w-64 bg-[#0A1629] text-[#A3AED0] flex flex-col p-6 sticky top-0 h-screen z-50">
            <div class="mb-10 text-white">
                <h1 class="text-2xl font-black tracking-tighter">AUTO2000</h1>
                <p class="text-[10px] uppercase tracking-widest text-[#A3AED0] font-bold">Pangkalan Bun Branch</p>
            </div>
            
            <nav class="flex-1 space-y-3">
                <p class="text-[10px] uppercase text-[#707EAE] font-bold tracking-widest px-3">Master Portal</p>
                <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-white/5 transition">
                    <i class="fa-solid fa-layer-group text-sm"></i> <span class="text-sm">Ekosistem Aplikasi</span>
                </a>

                <p class="text-[10px] uppercase text-[#707EAE] font-bold tracking-widest px-3 mt-6">AR Kendaraan (Unit)</p>
                <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-red-600 text-white font-bold shadow-lg shadow-red-900/20">
                    <i class="fa-solid fa-chart-pie"></i> <span class="text-sm">Dashboard Unit</span>
                </a>
                <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-white/5 transition">
                    <i class="fa-solid fa-file-invoice"></i> <span class="text-sm">Data AR Unit</span>
                </a>

                <p class="text-[10px] uppercase text-[#707EAE] font-bold tracking-widest px-3 mt-6">AR Service GR</p>
                <a href="#" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-white/5 transition">
                    <i class="fa-solid fa-screwdriver-wrench text-sm"></i> <span class="text-sm">Dashboard GR</span>
                </a>
            </nav>

            <button onclick="location.reload()" class="bg-[#111C44] border border-white/10 text-emerald-400 w-full py-3 rounded-xl flex items-center justify-center gap-2 text-xs font-bold hover:bg-[#1b254b] transition active:scale-95">
                <i class="fa-solid fa-sync"></i> SYNC DATA AKTIF
            </button>
        </aside>

        <main class="flex-1 p-10 overflow-y-auto">
            
            <header class="flex justify-between items-start mb-8">
                <div>
                    <p id="tgl-update-text" class="text-[10px] text-red-500 font-bold uppercase tracking-wider mb-1">
                        MENYINKRONKAN DATA SUPABASE...
                    </p>
                    <h2 class="text-3xl font-black text-[#1B2559]">Overview AR Unit</h2>
                    <div class="flex items-center gap-2 mt-2">
                        <div class="w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]"></div>
                        <p class="text-xs text-[#707EAE] italic font-medium">Mode: Realtime Database Connection</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="bg-white px-4 py-2.5 rounded-2xl border border-slate-100 shadow-sm flex items-center gap-3 text-[#A3AED0]">
                        <i class="fa-solid fa-calendar-alt text-lg"></i>
                        <span id="arsip-db-text" class="text-sm font-bold text-[#1B2559]">DB: --/--/----</span>
                    </div>
                    <button class="bg-red-50 text-red-600 px-6 py-2.5 rounded-2xl font-bold text-sm flex items-center gap-2 hover:bg-red-100 transition">
                        <i class="fa-solid fa-download"></i> DOWNLOAD
                    </button>
                </div>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-[2fr,1fr] gap-6 mb-8">
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm relative overflow-hidden">
                        <h3 class="text-xs font-bold text-[#707EAE] uppercase mb-4 flex justify-between items-center">Total O/S <i class="fa-solid fa-file-invoice text-[#A3AED0]"></i></h3>
                        <p id="total-os" class="text-2xl font-black text-[#1B2559]">Rp 0</p>
                        <div class="w-full h-1.5 bg-slate-100 rounded-full mt-5 flex overflow-hidden">
                            <div class="bg-emerald-500 h-full" style="width: 50%"></div>
                            <div class="bg-blue-500 h-full" style="width: 50%"></div>
                        </div>
                        <div class="flex justify-between text-[10px] mt-2 font-black uppercase text-[#707EAE]">
                            <span class="text-emerald-500">Cash Basis</span>
                            <span class="text-blue-500">Leasing Basis</span>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-[2rem] border border-rose-100 shadow-sm">
                        <h3 class="text-xs font-
