<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AR Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#eef2f6;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  height:100vh;
  position:fixed;
  background:#0f172a;
  color:white;
  padding:20px;
}
.sidebar h2{margin-bottom:30px;}
.menu div{
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  cursor:pointer;
}
.menu div.active, .menu div:hover{
  background:#ef4444;
}

/* MAIN */
.main{
  margin-left:260px;
  padding:20px;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.tabs button{
  margin-right:10px;
  padding:8px 15px;
  border:none;
  border-radius:20px;
  background:#e5e7eb;
  cursor:pointer;
}
.tabs .active{
  background:#2563eb;
  color:white;
}

/* KPI */
.kpi-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-top:20px;
}
.kpi{
  background:white;
  padding:15px;
  border-radius:12px;
}
.kpi h4{margin:0;font-size:12px;color:#888}
.kpi h2{margin:5px 0}
.blue{color:#2563eb}
.red{color:#dc2626}
.orange{color:#ea580c}
.green{color:#16a34a}

/* LAYOUT */
.main-grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
  margin-top:20px;
}

.big-box{
  background:white;
  padding:15px;
  border-radius:12px;
}

.right-box{
  display:grid;
  grid-template-rows:1fr 1fr;
  gap:20px;
}

.box{
  background:white;
  padding:15px;
  border-radius:12px;
}

/* BOTTOM */
.bottom-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px;
  margin-top:20px;
}

/* PROGRESS */
.bar{
  background:#e5e7eb;
  height:6px;
  border-radius:5px;
}
.fill{
  background:#2563eb;
  height:6px;
  border-radius:5px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>AUTO2000</h2>
  <div class="menu">
    <div class="active">Dashboard Unit</div>
    <div>Data AR Unit</div>
  </div>
</div>

<div class="main">

<div class="header">
  <h2>Overview AR Unit</h2>
  <div class="tabs">
    <button class="active">Ringkasan</button>
    <button>Leasing</button>
    <button>Overdue</button>
    <button>Database</button>
  </div>
</div>

<!-- KPI -->
<div id="kpi" class="kpi-grid"></div>

<!-- MAIN -->
<div class="main-grid">

  <div class="big-box">
    <h3>Aging Analysis</h3>
    <div id="agingChart"></div>
  </div>

  <div class="right-box">

    <div class="box">
      <h3>Leasing Composition</h3>
      <div id="leasingChart"></div>
    </div>

    <div class="box">
      <h3>Leasing Breakdown</h3>
      <div id="leasingBreakdown"></div>
    </div>

  </div>

</div>

<!-- BOTTOM -->
<div class="bottom-grid">

  <div class="box">
    <h3>Top Sales</h3>
    <div id="topSales"></div>
  </div>

  <div class="box">
    <h3>Leasing TVC</h3>
    <div id="tvc"></div>
  </div>

  <div class="box">
    <h3>Top Overdue</h3>
    <div id="topOverdue"></div>
  </div>

  <div class="box">
    <h3>SPV</h3>
    <div id="spv"></div>
  </div>

</div>

</div>

<script>
const supabase = supabase.createClient("YOUR_URL","YOUR_KEY");

let DATA=[];

// LOAD DATA
async function load(){
  let {data} = await supabase.from("ar_data").select("*");
  DATA=data;

  renderKPI();
  renderCharts();
  renderLists();
  renderBreakdown();
}

// KPI
function renderKPI(){
  document.getElementById("kpi").innerHTML=`
    <div class="kpi">
      <h4>Total OS Balance</h4>
      <h2 class="blue">Rp ${sum("os_balance")}</h2>
    </div>

    <div class="kpi">
      <h4>Total Overdue</h4>
      <h2 class="red">Rp ${sum("total_overdue")}</h2>
    </div>

    <div class="kpi">
      <h4>Potensi Penalti</h4>
      <h2 class="orange">Rp ${sum("penalty_amount")}</h2>
    </div>

    <div class="kpi">
      <h4>Belum Jatuh Tempo</h4>
      <h2 class="green">Rp ${sum("lancar")}</h2>
    </div>
  `;
}

// CHART
function renderCharts(){

  new ApexCharts(document.querySelector("#agingChart"),{
    chart:{type:'bar',height:300},
    series:[{
      data:[
        sum('lancar'),
        sum('hari_1_30'),
        sum('hari_31_60'),
        sum('lebih_60_hari')
      ]
    }],
    xaxis:{categories:['Lancar','1-30','31-60','>60']}
  }).render();

  let leasing=groupBy("leasing_name");

  new ApexCharts(document.querySelector("#leasingChart"),{
    chart:{type:'donut'},
    series:Object.values(leasing),
    labels:Object.keys(leasing)
  }).render();
}

// LIST
function renderLists(){

  let sales = Object.entries(groupBy("salesman_name"))
    .sort((a,b)=>b[1]-a[1]).slice(0,5);

  document.getElementById("topSales").innerHTML =
    sales.map(x=>`${x[0]} - ${x[1]}`).join("<br>");

  let overdue = [...DATA].sort((a,b)=>b.total_overdue-a.total_overdue).slice(0,5);

  document.getElementById("topOverdue").innerHTML =
    overdue.map(x=>`${x.customer_name} - ${x.total_overdue}`).join("<br>");
}

// BREAKDOWN
function renderBreakdown(){
  let data = groupBy("leasing_name");
  let html="";

  Object.entries(data).forEach(([k,v])=>{
    html+=`
      ${k}
      <div class="bar">
        <div class="fill" style="width:${v/100000000}%"></div>
      </div><br>
    `;
  });

  document.getElementById("leasingBreakdown").innerHTML=html;
}

// HELPER
function sum(field){
  return DATA.reduce((a,b)=>a+(b[field]||0),0);
}

function groupBy(field){
  let obj={};
  DATA.forEach(x=>{
    let key=x[field]||'Unknown';
    obj[key]=(obj[key]||0)+x.os_balance;
  });
  return obj;
}

load();
</script>

</body>
</html>
