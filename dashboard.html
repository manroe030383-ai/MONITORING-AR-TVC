<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overview AR Unit - Auto2000</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .card-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04); }
        .nav-active { background-color: #1B2559 !important; color: white !important; }
        .box-total { border-radius: 12px; padding: 12px; }
        .transition-all { transition: all 0.3s ease; }
        .tab-content { display: block; }
        .tab-content.hidden { display: none; }
        .input-custom {
            border: 1px solid #E2E8F0;
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 10px;
            width: 100%;
            transition: all 0.2s;
        }
        .input-custom:focus {
            border-color: #3B82F6;
            outline: none;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen flex text-[#1B2559]">

    <aside class="w-64 bg-[#0B1324] text-slate-400 hidden lg:flex flex-col p-6 sticky top-0 h-screen shadow-xl">
        <div class="flex items-center gap-3 mb-10">
            <div class="bg-red-600 text-white w-9 h-9 rounded-lg flex items-center justify-center font-bold text-lg">A</div>
            <div>
                <h1 class="text-white font-bold text-xs uppercase tracking-wide">Auto2000</h1>
                <p class="text-[8px] uppercase tracking-widest text-slate-500">Branch Control</p>
            </div>
        </div>
        <nav class="space-y-1">
            <p class="text-[9px] font-bold text-slate-600 uppercase mb-4 px-2 tracking-widest">AR Kendaraan (Unit)</p>
            <button id="side-btn-ringkasan" onclick="filterTab(this, 'ringkasan')" class="w-full flex items-center gap-3 p-3 bg-red-600 text-white rounded-xl text-xs font-bold shadow-lg transition-all text-left">
                📊 Dashboard Unit
            </button>
            <button id="side-btn-ar-unit" onclick="filterTab(this, 'ar_unit')" class="w-full flex items-center gap-3 p-3 text-slate-400 hover:bg-slate-800/50 hover:text-white rounded-xl text-xs font-medium transition-all text-left">
                📄 Data AR Unit
            </button>
        </nav>
    </aside>

    <main class="flex-1 p-6 overflow-x-hidden">
        
        <div class="flex justify-between items-start mb-6">
            <div>
                <p id="status-update" class="text-[9px] font-bold text-red-600 uppercase tracking-widest mb-1 italic">MEMUAT DATA...</p>
                <h2 class="text-2xl font-extrabold tracking-tight">Overview AR Unit</h2>
                <div class="flex gap-2 mt-4">
                    <button onclick="filterTab(this, 'ringkasan')" class="nav-btn nav-active px-4 py-1.5 text-[10px] font-bold rounded-lg border border-slate-200 transition-all">Ringkasan</button>
                    <button onclick="filterTab(this, 'leasing')" class="nav-btn bg-white text-slate-500 px-4 py-1.5 text-[10px] font-bold rounded-lg border border-slate-200 transition-all">Leasing</button>
                    <button onclick="filterTab(this, 'overdue')" class="nav-btn bg-white text-slate-500 px-4 py-1.5 text-[10px] font-bold rounded-lg border border-slate-200 transition-all">Overdue</button>
                    <button onclick="filterTab(this, 'database')" class="nav-btn bg-white text-slate-500 px-4 py-1.5 text-[10px] font-bold rounded-lg border border-slate-200 transition-all">Database Lengkap</button>
                </div>
            </div>
            <div class="flex gap-4 items-center">
                <div class="bg-white p-3 rounded-xl border border-slate-100 flex flex-col items-end shadow-sm">
                    <span class="text-[8px] font-bold text-slate-400 uppercase">ARSIP DB:</span>
                    <span id="tgl-arsip" class="text-xs font-black">Memuat...</span>
                </div>
                <button id="btn-download-excel" class="bg-white border border-slate-200 px-4 py-2.5 rounded-xl text-[10px] font-bold uppercase hover:bg-emerald-600 hover:text-white hover:border-emerald-600 transition-all shadow-sm">Download Excel</button>
            </div>
        </div>

        <div id="content-ringkasan" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="bg-white p-5 rounded-2xl border border-slate-100 card-shadow">
                    <h4 class="text-[10px] font-bold text-blue-500 uppercase mb-4">📊 Breakdown Leasing TVC</h4>
                    <div class="bg-[#F0F7FF] p-6 rounded-2xl border border-blue-100 text-center mb-4">
                        <span class="text-[9px] font-bold text-blue-600 uppercase tracking-widest">Total Penjualan TAFS & ACC</span>
                        <p id="total-unit-tvc" class="text-3xl font-black text-[#1B2559]">0 Unit</p>
                    </div>
                    <div id="container-lead-time" class="mt-4 pt-4 border-t border-slate-100">
                        <h4 class="text-[9px] font-bold text-slate-400 uppercase mb-3">Avg Lead Time (LUNAS)</h4>
                        <div id="list-avg-leasing" class="space-y-3">
                            </div>
                    </div>
                    </div>
            </div>
        </div>
        
        </main>

    <script type="module" src="script.js"></script>
    <script>
        function filterTab(btn, tabName) {
            // (Logika filterTab Anda tetap utuh)
            document.querySelectorAll('.nav-btn').forEach(b => {
                b.classList.remove('nav-active');
                b.classList.add('bg-white', 'text-slate-500');
            });
            const sideDashboard = document.getElementById('side-btn-ringkasan');
            const sideDatabase = document.getElementById('side-btn-ar-unit');
            if (sideDashboard && sideDatabase) {
                [sideDashboard, sideDatabase].forEach(sb => {
                    sb.classList.remove('bg-red-600', 'text-white', 'font-bold', 'shadow-lg');
                    sb.classList.add('text-slate-400', 'font-medium');
                });
                if (['ringkasan', 'leasing', 'overdue', 'database'].includes(tabName)) {
                    sideDashboard.classList.add('bg-red-600', 'text-white', 'font-bold', 'shadow-lg');
                    sideDashboard.classList.remove('text-slate-400', 'font-medium');
                } else if (tabName === 'ar_unit') {
                    sideDatabase.classList.add('bg-red-600', 'text-white', 'font-bold', 'shadow-lg');
                    sideDatabase.classList.remove('text-slate-400', 'font-medium');
                }
            }
            const targetTopBtn = document.querySelector(`button[onclick*="'${tabName}'"]`);
            if (targetTopBtn && targetTopBtn.classList.contains('nav-btn')) {
                targetTopBtn.classList.add('nav-active');
                targetTopBtn.classList.remove('bg-white', 'text-slate-500');
            }
            document.querySelectorAll('.tab-content').forEach(content => { content.classList.add('hidden'); });
            const targetContent = document.getElementById(`content-${tabName}`);
            if (targetContent) { targetContent.classList.remove('hidden'); }
            if (tabName === 'ringkasan') { window.dispatchEvent(new Event('resize')); }
        }

        // TAMBAHAN FUNGSI UNTUK MENGISI DATA
        function updateLeadTimeUI(dataArray) {
            const container = document.getElementById('list-avg-leasing');
            if(!container) return;
            container.innerHTML = dataArray.map(item => `
                <div class="text-[10px] font-bold">
                    <div class="flex justify-between mb-1">
                        <span class="text-slate-600">${item.leasing}</span>
                        <span class="text-[#1B2559]">${item.avg} Hari</span>
                    </div>
                    <div class="w-full bg-slate-100 h-1 rounded-full overflow-hidden">
                        <div class="bg-blue-500 h-1 rounded-full" style="width: ${Math.min((item.avg/30)*100, 100)}%"></div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
