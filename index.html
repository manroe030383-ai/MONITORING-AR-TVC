<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Branch Control Center Pangkalan Bun</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Poppins', sans-serif; }
        .login-container { display:flex; height:100vh; }
        .hero-section { flex:1; background:#800000; color:white; display:flex; justify-content:center; align-items:center; }
        .hero-content { padding:50px; }
        .hero-content h1 { font-size:48px; font-weight:700; line-height:1.2; }
        .hero-content p { margin-top:20px; font-size:18px; }
        .form-section { flex:1; display:flex; justify-content:center; align-items:center; background:#f8f8f8; }
        .form-box { background:white; padding:40px; border-radius:15px; width:100%; max-width:380px; box-shadow:0 4px 15px rgba(0,0,0,0.15); }
        .form-box h2 { color:#800000; font-weight:700; text-align:center; margin-bottom:10px; }
        .subtitle { text-align:center; font-size:14px; color:#555; margin-bottom:25px; }
        .input-group { margin-bottom:20px; }
        .input-group label { font-size:12px; color:#555; margin-bottom:5px; display:block; font-weight:600; }
        .input-wrapper { position:relative; }
        .input-wrapper i { position:absolute; top:50%; left:12px; transform:translateY(-50%); color:#800000; }
        .input-wrapper input { width:100%; padding:12px 12px 12px 40px; border-radius:8px; border:1px solid #ddd; font-size:14px; outline:none; }
        .alert-danger { display:none; margin-bottom:15px; background:#ffdddd; color:#d8000c; padding:12px; border-radius:8px; font-size:13px; align-items:center; }
        .btn-login { width:100%; padding:14px; background:#800000; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer; transition:0.3s; }
        .btn-login:hover { background:#a00000; }
        .footer-info { margin-top:25px; font-size:11px; color:#777; display:flex; justify-content:center; gap:10px; }
        .footer-info b { color:#800000; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="hero-section">
        <div class="hero-content">
            <h1>Branch Control <br> Center.</h1>
            <p>Pusat kendali Administrasi cabang Pangkalan Bun</p>
        </div>
    </div>

    <div class="form-section">
        <div class="form-box">
            <h2>Login Sistem</h2>
            <p class="subtitle">Gunakan kredensial otorisasi Anda.</p>

            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>USERNAME</label>
                    <div class="input-wrapper">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="username" placeholder="admin / tafs / acc" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>PASSWORD</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="********" required>
                    </div>
                </div>

                <div id="errorAlert" class="alert-danger">
                    <i class="fa-solid fa-circle-exclamation" style="margin-right:8px;"></i>
                    <span>Username atau password salah!</span>
                </div>

                <button type="submit" class="btn-login">Masuk Sistem</button>
            </form>

            <div class="footer-info">
                <span>Admin: <b>admin</b></span>
                <span>|</span>
                <span>TAFS: <b>tafs</b></span>
                <span>|</span>
                <span>ACC: <b>acc</b></span>
            </div>
        </div>
    </div>
</div>

<script>
function handleLogin(e) {
    e.preventDefault();
    const user = document.getElementById('username').value.trim().toLowerCase();
    const pass = document.getElementById('password').value.trim();
    const errorBox = document.getElementById('errorAlert');

    errorBox.style.display = "none";

    // Validasi kredensial
    if (
        (user === "admin" && pass === "admin123") || 
        (user === "tafs" && pass === "tafs123") || 
        (user === "acc" && pass === "acc123")
    ) {
        // Simpan info login
        localStorage.setItem("currentUser", user.toUpperCase());
        
        // --- REDIRECT KE DASHBOARD GRAFIK (dashboard.html) ---
        window.location.href = "dashboard.html"; 
    } else {
        errorBox.style.display = "flex";
    }
}
</script>

</body>
</html>
