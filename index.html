<!DOCTYPE html>
<html>
<head>
    <title>Login Dashboard</title>

    <style>
        body{
            background:#7a0000;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial;
        }

        .login{
            background:white;
            padding:30px;
            border-radius:10px;
            width:300px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:10px;
        }

        button{
            width:100%;
            padding:10px;
            margin-top:15px;
            background:#7a0000;
            color:white;
            border:none;
        }
    </style>

</head>

<body>

<div class="login">

    <h2>Login</h2>

    <input type="text" id="user" placeholder="username">
    <input type="password" id="pass" placeholder="password">

    <button onclick="login()">Login</button>

</div>

<script>

function login(){

    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u=="admin" && p=="1234"){
        window.location="admin.html";
    }else{
        alert("Login salah");
    }

}

</script>

</body>
</html>
