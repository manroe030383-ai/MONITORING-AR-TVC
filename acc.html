<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACC Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <div class="bg-gradient-to-r from-red-900 to-red-700 bg-[#991b1b] text-white px-6 py-4 flex justify-between items-center shadow-lg">
        <h1 class="text-2xl font-bold tracking-wide">ACC Dashboard</h1>
        <button class="bg-white text-red-600 px-4 py-2 rounded-md font-medium text-sm hover:bg-gray-100 transition-all shadow-sm">
            Logout
        </button>
    </div>

    <div class="p-6 space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-100 flex flex-col justify-between min-h-[140px]">
                <span class="text-sm font-bold text-gray-800 tracking-tight">Total Outstanding</span>
                <span class="text-4xl font-extrabold text-black mt-4" id="total-outstanding">Rp 0</span>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-100 flex flex-col justify-between min-h-[140px]">
                <span class="text-sm font-bold text-gray-800 tracking-tight">PAID</span>
                <span class="text-4xl font-extrabold text-black mt-4" id="total-paid">0 Unit</span>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-100 flex flex-col justify-between min-h-[140px]">
                <span class="text-sm font-bold text-gray-800 tracking-tight">On Proses</span>
                <span class="text-4xl font-extrabold text-black mt-4" id="total-on-proses">0 Unit</span>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-100 flex flex-col justify-between min-h-[140px]">
                <span class="text-sm font-bold text-gray-800 tracking-tight">Overdue</span>
                <span class="text-4xl font-extrabold text-red-600 mt-4" id="total-overdue">0 Unit</span>
            </div>

        </div>

        <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-4 flex items-center">
            <p class="text-xs font-bold uppercase tracking-wider text-amber-500 italic" id="status-update">Memuat data penagihan dari Supabase...</p>
        </div>

        <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-4 overflow-hidden">
            
            <div class="grid grid-cols-8 bg-[#dc2626] text-white rounded-lg text-center font-semibold text-xs shadow-sm overflow-hidden py-3">
                <div class="px-1">Customer Name</div>
                <div class="px-1">Salesman Name</div>
                <div class="px-1">O/S Balance</div>
                <div class="px-1">Material Code</div>
                <div class="px-1">Ket Cabang (Read Only)</div>
                <div class="px-1">Plan Bayar Leasing</div>
                <div class="px-1">Keterangan Leasing</div>
                <div class="px-1">Aksi</div>
            </div>
            
            <div id="acc-table-body" class="divide-y divide-gray-100 max-h-[500px] overflow-y-auto mt-2">
            </div>

        </div>

    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const SUPABASE_URL = 'https://ahaoznkudusajtzfbnqj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFoYW96bmt1ZHVzYWp0emZibnFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMzQ0NTEsImV4cCI6MjA5MDgxMDQ1MX0.RbMEdiLooCsDKefdXnM_0jse63_C4sl1tWQ5BfWVU1s';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        window.cachedData = [];

        const fmtIDR = (v) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(v || 0);

        // FUNGSI PENYELAMAT SINKRONISASI KOLOM BESAR KECIL
        function getProp(obj, key) {
            if (!obj) return undefined;
            if (obj[key.toLowerCase()] !== undefined) return obj[key.toLowerCase()];
            if (obj[key.toUpperCase()] !== undefined) return obj[key.toUpperCase()];
            if (obj[key] !== undefined) return obj[key];
            
            const lowerKey = key.toLowerCase();
            for (let k in obj) {
                if (k.toLowerCase() === lowerKey) return obj[k];
            }
            return undefined;
        }

        // AMBIL DATA DARI SUPABASE DAN FILTER KHUSUS ACC
        async function fetchAccData() {
            try {
                const { data, error } = await supabase.from('ar_unit').select('*');
                if (error) throw error;

                if (data) {
                    window.cachedData = data;
                    
                    let accMetrics = { os: 0, paid: 0, onProses: 0, overdue: 0 };
                    let htmlRows = '';

                    data.forEach((d, i) => {
                        const leasing = String(getProp(d, 'leasing_name') || getProp(d, 'leasing') || '').toUpperCase().trim();
                        
                        // Validasi filter data hanya untuk leasing ACC
                        if (leasing.includes('ACC')) {
                            const os = Number(getProp(d, 'os_balance') || getProp(d, 'balance') || 0);
                            
                            const ov1 = Number(getProp(d, 'hari_1_30') || getProp(d, 'lancar') || 0);
                            const ov2 = Number(getProp(d, 'hari_31_60') || 0);
                            const ov3 = Number(getProp(d, 'lebih_60_hari') || 0);
                            const totalOv = Number(getProp(d, 'total_overdue') || 0);
                            const isOverdue = (ov1 + ov2 + ov3 + totalOv) > 0;

                            const statusTagih = String(getProp(d, 'status_tagih') || getProp(d, 'status') || '').toUpperCase().trim();
                            
                            const customerName = getProp(d, 'customer_name') || '-';
                            const salesmanName = getProp(d, 'salesman_name') || getProp(d, 'supervisor_name') || 'OFFICE';
                            const materialCode = getProp(d, 'material_code') || '-';
                            
                            // Ambil data catatan dengan fungsi getProp anti-meleset
                            const valKetCabang = getProp(d, 'ket_cabang') !== null && getProp(d, 'ket_cabang') !== undefined ? String(getProp(d, 'ket_cabang')) : '';
                            const valPlanBayar = getProp(d, 'plan_bayar_leasing') !== null && getProp(d, 'plan_bayar_leasing') !== undefined ? String(getProp(d, 'plan_bayar_leasing')) : '';
                            const valKetLeasing = getProp(d, 'ket_leasing') !== null && getProp(d, 'ket_leasing') !== undefined ? String(getProp(d, 'ket_leasing')) : '';

                            const uiId = i;
                            const idUtama = getProp(d, 'No') || getProp(d, 'id') || i;

                            // Kalkulasi ringkasan metrik status unit
                            if (statusTagih === 'SUDAH GI' || statusTagih === 'PAID' || os === 0) {
                                accMetrics.paid++;
                            } else {
                                accMetrics.os += os;
                                if (isOverdue) {
                                    accMetrics.overdue++;
                                } else {
                                    accMetrics.onProses++;
                                }
                            }

                            // Render baris data ke dalam struktur HTML
                            htmlRows += `
                            <div class="grid grid-cols-8 text-center py-3 text-xs font-bold uppercase text-gray-700 hover:bg-gray-50 items-center border-b border-gray-100">
                                <div class="truncate px-2 text-left font-black text-slate-800">${customerName}</div>
                                <div class="truncate px-1 text-slate-600">${salesmanName}</div>
                                <div class="text-blue-600 font-black">${fmtIDR(os)}</div>
                                <div class="text-gray-500 font-mono text-[11px]">${materialCode}</div>
                                <div class="px-1">
                                    <input type="text" id="cabang-${uiId}" data-customer="${customerName}" data-no="${getProp(d, 'No') || ''}" data-id="${getProp(d, 'id') || ''}" value="${valKetCabang}" placeholder="Belum ada catatan..." class="w-full text-[11px] p-1.5 border border-gray-200 rounded-md bg-gray-50 text-gray-500 font-medium cursor-not-allowed focus:outline-none" readonly>
                                </div>
                                <div class="px-1">
                                    <input type="text" id="plan-${uiId}" value="${valPlanBayar}" placeholder="Isi plan..." class="w-full text-[11px] p-1.5 border border-gray-200 rounded-md bg-white font-medium focus:outline-none focus:border-red-500">
                                </div>
                                <div class="px-1">
                                    <input type="text" id="ket-${uiId}" value="${valKetLeasing}" placeholder="Isi keterangan..." class="w-full text-[11px] p-1.5 border border-gray-200 rounded-md bg-white font-medium focus:outline-none focus:border-red-500">
                                </div>
                                <div class="text-center">
                                    <button onclick="simpanCatatanAcc('${uiId}')" class="text-red-600 hover:bg-red-600 hover:text-white bg-red-50 p-2 rounded-lg transition-all" title="Simpan Catatan">💾</button>
                                </div>
                            </div>`;
                        }
                    });

                    // Update komponen angka di dashboard screen
                    if(document.getElementById('total-outstanding')) document.getElementById('total-outstanding').innerText = fmtIDR(accMetrics.os);
                    if(document.getElementById('total-paid')) document.getElementById('total-paid').innerText = `${accMetrics.paid} Unit`;
                    if(document.getElementById('total-on-proses')) document.getElementById('total-on-proses').innerText = `${accMetrics.onProses} Unit`;
                    if(document.getElementById('total-overdue')) document.getElementById('total-overdue').innerText = `${accMetrics.overdue} Unit`;

                    const tableBody = document.getElementById('acc-table-body');
                    if(tableBody) {
                        tableBody.innerHTML = htmlRows ? htmlRows : '<div class="text-center py-8 text-gray-400 text-xs font-bold">TIDAK ADA DATA PIUTANG ACC</div>';
                    }

                    if (document.getElementById('status-update')) {
                        document.getElementById('status-update').innerText = `KONEKSI BERHASIL - DATA ACC TERKONEKSI SINKRON: ${new Date().toLocaleString('id-ID')} WIB`;
                        document.getElementById('status-update').className = "text-xs font-bold uppercase tracking-wider text-emerald-600 italic";
                    }
                }
            } catch (err) {
                console.error("Gagal sinkronisasi data ACC:", err);
                if (document.getElementById('status-update')) {
                    document.getElementById('status-update').innerText = `KONEKSI BERMASALAH: ${err.message}`;
                    document.getElementById('status-update').className = "text-xs font-bold uppercase tracking-wider text-red-600 italic";
                }
            }
        }

        // PROSES UPDATE: MENETAPKAN TARGET BARIS BERDASARKAN NAMA CUSTOMER SECARA PRESISI
        window.simpanCatatanAcc = async function(uiId) {
            const inputCabang = document.getElementById(`cabang-${uiId}`);
            const inputPlan = document.getElementById(`plan-${uiId}`);
            const inputKet = document.getElementById(`ket-${uiId}`);

            const customerName = inputCabang.getAttribute('data-customer');
            const dataNo = inputCabang.getAttribute('data-no');
            const dataId = inputCabang.getAttribute('data-id');

            const valPlan = inputPlan.value;
            const valKet = inputKet.value;

            try {
                inputPlan.setAttribute('value', valPlan);
                inputKet.setAttribute('value', valKet);

                let payload = {};
                
                // Cek nama kolom asli server secara dinamis untuk menghindari salah ketik besar/kecil
                if (window.cachedData && window.cachedData.length > 0) {
                    const sample = window.cachedData[0];
                    const kPlan = sample['Plan_Bayar_Leasing'] !== undefined ? 'Plan_Bayar_Leasing' : 
                                  (sample['plan_bayar_leasing'] !== undefined ? 'plan_bayar_leasing' : 'plan_bayar_leasing');
                    const kKet = sample['Ket_Leasing'] !== undefined ? 'Ket_Leasing' : 
                                 (sample['ket_leasing'] !== undefined ? 'ket_leasing' : 'ket_leasing');
                    
                    payload[kPlan] = valPlan;
                    payload[kKet] = valKet;
                } else {
                    payload['plan_bayar_leasing'] = valPlan;
                    payload['ket_leasing'] = valKet;
                }

                let queryBuilder = supabase.from('ar_unit').update(payload);

                // STRATEGI PENCARIAN BERLAPIS ANTI-MELESET (ID -> NO -> CUSTOMER NAME OR MULTI-QUERY)
                if (dataId && dataId !== "") {
                    queryBuilder = queryBuilder.eq('id', dataId);
                } else if (dataNo && dataNo !== "") {
                    if (window.cachedData && window.cachedData.length > 0 && window.cachedData[0]['no'] !== undefined) {
                        queryBuilder = queryBuilder.eq('no', Number(dataNo));
                    } else {
                        queryBuilder = queryBuilder.eq('No', Number(dataNo));
                    }
                } else {
                    queryBuilder = queryBuilder.or(`customer_name.eq."${customerName}","Customer name".eq."${customerName}","CUSTOMER_NAME".eq."${customerName}"`);
                }

                const { error } = await queryBuilder;
                if (error) throw error;
                
                alert("Catatan ACC Berhasil Disimpan Langsung ke Admin Pusat! 👍");
                
                // Tarik ulang data segar dari server tanpa me-reload penuh browser pengguna
                fetchAccData();

            } catch (err) {
                console.error(err);
                alert("Gagal sinkronisasi ke Admin: " + err.message);
            }
        }

        document.addEventListener('DOMContentLoaded', fetchAccData);
    </script>
</body>
</html>
