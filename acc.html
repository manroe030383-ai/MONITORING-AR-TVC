<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACC Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.mini.min.js"></script>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <div class="bg-[#8B0000] text-white px-6 py-4 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 shadow-md">
        <div>
            <div class="text-[10px] font-bold text-emerald-400 uppercase tracking-wider flex items-center gap-1 mb-1">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                DATA UPDATE: <span id="realtime-clock" class="font-mono">MEMUAT...</span>
            </div>
            <h1 class="text-2xl font-bold tracking-tight uppercase">ACC Dashboard</h1>
        </div>
        <button id="btn-download-excel" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg font-bold text-xs uppercase tracking-wider transition-all">
            💾 DOWNLOAD EXCEL
        </button>
    </div>

    <div class="p-6 grid grid-cols-1 md:grid-cols-4 gap-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <span class="text-xs font-bold text-gray-500 uppercase">Outstanding</span>
            <div class="text-2xl font-black mt-2" id="total-outstanding">Rp 0</div>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <span class="text-xs font-bold text-gray-500 uppercase">Paid</span>
            <div class="text-2xl font-black mt-2" id="total-paid">0 Unit</div>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <span class="text-xs font-bold text-gray-500 uppercase">On Proses</span>
            <div class="text-2xl font-black mt-2" id="total-on-proses">0 Unit</div>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <span class="text-xs font-bold text-red-500 uppercase">Overdue</span>
            <div class="text-2xl font-black text-red-600 mt-2" id="total-overdue">0 Unit</div>
        </div>
    </div>

    <div class="px-6 pb-10">
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <table class="w-full text-left text-[11px] uppercase">
                <thead class="bg-[#DC2626] text-white">
                    <tr>
                        <th class="p-4 text-center">No</th>
                        <th class="p-4">Customer</th>
                        <th class="p-4">SPK</th>
                        <th class="p-4">Balance</th>
                        <th class="p-4">Plan Bayar</th>
                        <th class="p-4">Ket Leasing</th>
                        <th class="p-4 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="acc-table-body" class="divide-y divide-gray-100"></tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const supabase = createClient('https://ahaoznkudusajtzfbnqj.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFoYW96bmt1ZHVzYWp0emZibnFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMzQ0NTEsImV4cCI6MjA5MDgxMDQ1MX0.RbMEdiLooCsDKefdXnM_0jse63_C4sl1tWQ5BfWVU1s');

        async function fetchData() {
            const { data, error } = await supabase.from('ar_unit').select('*');
            if (error) return console.error(error);

            const tbody = document.getElementById('acc-table-body');
            tbody.innerHTML = '';
            
            let metrics = { os: 0, paid: 0, onProses: 0, overdue: 0 };

            data.filter(d => (d.leasing_name || d.leasing || '').toUpperCase().includes('ACC')).forEach((d, i) => {
                const os = Number(d.os_balance || d.balance || 0);
                const isOverdue = (Number(d.total_overdue || 0) > 0);
                const status = (d.status_tagih || d.status || '').toUpperCase();

                if (status === 'SUDAH GI' || status === 'PAID' || os === 0) metrics.paid++;
                else { metrics.os += os; isOverdue ? metrics.overdue++ : metrics.onProses++; }

                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50">
                        <td class="p-4 text-center">${i + 1}</td>
                        <td class="p-4 font-bold">${d.customer_name || '-'}</td>
                        <td class="p-4">${d.No_SPK || d.no_spk || '-'}</td>
                        <td class="p-4 text-blue-600 font-bold">${os.toLocaleString()}</td>
                        <td class="p-4"><input type="text" id="plan-${d.id}" value="${d.Plan_Bayar_Leasing || ''}" class="border p-1 w-full rounded"></td>
                        <td class="p-4"><input type="text" id="ket-${d.id}" value="${d.Ket_Leasing || ''}" class="border p-1 w-full rounded"></td>
                        <td class="p-4 text-center"><button onclick="simpan('${d.id}')" class="bg-purple-600 text-white px-3 py-1 rounded">SIMPAN</button></td>
                    </tr>`;
            });

            document.getElementById('total-outstanding').innerText = 'Rp ' + metrics.os.toLocaleString();
            document.getElementById('total-paid').innerText = metrics.paid + ' Unit';
            document.getElementById('total-on-proses').innerText = metrics.onProses + ' Unit';
            document.getElementById('total-overdue').innerText = metrics.overdue + ' Unit';
        }

        window.simpan = async (id) => {
            const { error } = await supabase.from('ar_unit')
                .update({ 
                    'Plan_Bayar_Leasing': document.getElementById(`plan-${id}`).value,
                    'Ket_Leasing': document.getElementById(`ket-${id}`).value 
                })
                .eq('id', id);

            if (error) alert("Error: " + error.message);
            else { alert("Berhasil!"); fetchData(); }
        }

        setInterval(() => document.getElementById('realtime-clock').innerText = new Date().toLocaleTimeString(), 1000);
        fetchData();
    </script>
</body>
</html>
