<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAFS Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="p-3 md:p-6 bg-slate-50 text-slate-900 antialiased">

    <header style="background-color: #1E3A8A;" class="flex flex-col md:flex-row md:items-center md:justify-between p-4 rounded-xl mb-6 gap-3 text-white shadow-lg">
        <div>
            <div id="status-update" class="text-[9px] font-bold text-emerald-400 uppercase tracking-widest mb-1 italic">MEMUAT...</div>
            <h1 class="text-lg md:text-2xl font-black uppercase tracking-tight">TAFS DASHBOARD</h1>
        </div>
        <button id="btn-download-excel" class="bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold text-[10px] px-4 py-2 rounded-lg transition-all uppercase w-full md:w-auto">
            💾 DOWNLOAD EXCEL
        </button>
    </header>

    <section class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
        <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
            <span class="text-[9px] font-extrabold text-slate-400 uppercase">TOTAL O/S</span>
            <h2 id="tafs-outstanding" class="text-md md:text-xl font-black text-[#1E3A8A] mt-1">Rp 0</h2>
        </div>
        <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
            <span class="text-[9px] font-extrabold text-slate-400 uppercase">PAID</span>
            <h2 id="tafs-paid" class="text-md md:text-xl font-black text-slate-700 mt-1">0 Unit</h2>
        </div>
        <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
            <span class="text-[9px] font-extrabold text-slate-400 uppercase">ON PROSES</span>
            <h2 id="tafs-on-proses" class="text-md md:text-xl font-black text-amber-500 mt-1">0 Unit</h2>
        </div>
        <div class="bg-white p-4 rounded-xl border border-slate-100 shadow-sm">
            <span class="text-[9px] font-extrabold text-slate-400 uppercase">OVERDUE</span>
            <h2 id="tafs-overdue" class="text-md md:text-xl font-black text-red-500 mt-1">0 Unit</h2>
        </div>
    </section>

    <section class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden">
        <div class="bg-slate-100 px-4 py-3 border-b border-slate-200">
            <h3 class="text-[10px] font-black uppercase text-blue-900">BINDING ENTRY DATA</h3>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse text-[10px] md:text-xs">
                <thead>
                    <tr class="bg-blue-600 text-white uppercase font-bold">
                        <th class="p-3 text-center">No</th>
                        <th class="p-3 min-w-[120px]">Nama Customer</th>
                        <th class="p-3 min-w-[100px]">Leasing & SPK</th>
                        <th class="p-3 text-right">O/S Balance</th>
                        <th class="p-3 min-w-[150px]">Keterangan</th>
                        <th class="p-3">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tab-ar-unit-body" class="divide-y divide-slate-100">
                    <tr><td colspan="6" class="p-4 text-center text-slate-400">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </section>

    <script>
        function jalankanJamRealtime() {
            const elStatus = document.getElementById('status-update');
            const sekarang = new Date();
            elStatus.innerText = `DATA UPDATE: ${sekarang.toLocaleDateString('id-ID')}, ${sekarang.toLocaleTimeString('id-ID')} WIB (LIVE)`;
        }
        setInterval(jalankanJamRealtime, 1000);
    </script>
</body>
</html>
