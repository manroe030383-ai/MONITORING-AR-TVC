<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAFS Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .input-custom {
            width: 100%; padding: 0.5rem; font-size: 11px; font-weight: 700;
            border: 1px solid #e2e8f0; border-radius: 0.375rem; outline: none;
            transition: all 0.2s;
        }
        .input-custom:focus { border-color: #1e3a8a; box-shadow: 0 0 0 2px rgba(30,58,138,0.1); }
        
        /* FIX UNTUK MOBILE */
        .table-container {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch; /* Biar smooth scroll di iPhone/Android */
        }
        /* Memastikan kolom tabel tidak terlalu rapat di HP */
        table { min-width: 800px; } 
    </style>
</head>
<body class="p-2 md:p-4 lg:p-6 bg-slate-50 text-slate-900 antialiased">

    <header style="background-color: #1E3A8A;" class="flex flex-col md:flex-row md:items-center md:justify-between border-b border-slate-200 p-4 rounded-xl mb-6 gap-3 text-white shadow-md">
        <div>
            <div id="status-update" class="text-[9px] font-bold text-emerald-400 uppercase tracking-widest mb-1 italic font-mono">MEMUAT LIVE CLOCK...</div>
            <h1 class="text-lg lg:text-2xl font-black text-white tracking-tight flex items-center gap-2 uppercase">
                TAFS DASHBOARD  
                <span class="bg-amber-400 text-blue-950 text-[9px] px-1.5 py-0.5 rounded-md font-extrabold tracking-wide shrink-0">LEASING</span>
            </h1>
        </div>
        <div class="flex items-center">
            <button id="btn-download-excel" class="w-full md:w-auto bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold text-[10px] px-4 py-2.5 rounded-lg shadow-sm transition-all flex items-center justify-center gap-2 cursor-pointer uppercase">
                <span>💾</span> EXCEL
            </button>
        </div>
    </header>

    <section class="grid grid-cols-2 lg:grid-cols-4 gap-2 lg:gap-4 mb-6">
        <div class="bg-white p-3 rounded-xl border border-slate-100 shadow-xs">
            <span class="text-[9px] font-extrabold text-slate-400 uppercase">O/S</span>
            <h2 id="tafs-outstanding" class="text-sm lg:text-xl font-black text-[#1E3A8A] mt-1 truncate">Rp 0</h2>
        </div>
        <div class="bg-white p-3 rounded-xl border border-slate-100 shadow-xs">
            <span class="text-[9px] font-extrabold text-slate-400 uppercase">PAID</span>
            <h2 id="tafs-paid" class="text-sm lg:text-xl font-black text-slate-700 mt-1">0</h2>
        </div>
        <div class="bg-white p-3 rounded-xl border border-slate-100 shadow-xs">
            <span class="text-[9px] font-extrabold text-slate-400 uppercase">PROSES</span>
            <h2 id="tafs-on-proses" class="text-sm lg:text-xl font-black text-amber-500 mt-1">0</h2>
        </div>
        <div class="bg-white p-3 rounded-xl border border-slate-100 shadow-xs">
            <span class="text-[9px] font-extrabold text-slate-400 uppercase">OVERDUE</span>
            <h2 id="tafs-overdue" class="text-sm lg:text-xl font-black text-red-500 mt-1">0</h2>
        </div>
    </section>

    <section class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden mb-6">
        <div class="bg-slate-100 px-4 py-3 border-b border-slate-200/60">
            <h3 class="text-[10px] font-black uppercase text-blue-900 tracking-wide">BINDING ENTRY REKONSILIASI</h3>
        </div>
        <div class="table-container">
            <table class="w-full text-left border-collapse text-[10px]">
                <thead>
                    <tr style="background-color: #2563EB;" class="text-white font-extrabold uppercase">
                        <th class="p-3 w-10 text-center">No</th>
                        <th class="p-3">Customer</th>
                        <th class="p-3">Leasing & SPK</th>
                        <th class="p-3 text-right">O/S Balance</th>
                        <th class="p-3">Ket Admin</th>
                        <th class="p-3 bg-blue-700/50">Plan Bayar</th>
                        <th class="p-3 bg-blue-700/50">Ket Leasing</th>
                        <th class="p-3 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tab-ar-unit-body" class="divide-y divide-slate-100">
                    <tr>
                        <td colspan="8" class="p-4 text-center text-slate-400 font-bold uppercase">Memuat data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>

    <script>
        function jalankanJamRealtime() {
            const elStatus = document.getElementById('status-update');
            if (elStatus) {
                const sekarang = new Date();
                const tanggal = String(sekarang.getDate()).padStart(2, '0') + '/' + String(sekarang.getMonth() + 1).padStart(2, '0') + '/' + sekarang.getFullYear();
                const waktu = sekarang.toLocaleTimeString('id-ID', { hour12: false }).replace(/:/g, '.');
                elStatus.innerText = `UPDATE: ${tanggal}, ${waktu} WIB`;
            }
        }
        jalankanJamRealtime();
        setInterval(jalankanJamRealtime, 1000);
    </script>
    <script type="module" src="script.js"></script>
</body>
</html>
