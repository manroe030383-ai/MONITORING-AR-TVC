<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TAFS Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <div class="bg-gradient-to-r from-blue-900 to-blue-700 bg-[#1e40af] text-white px-6 py-4 flex justify-between items-center shadow-lg">
        <h1 class="text-2xl font-bold tracking-wide">TAFS Dashboard</h1>
        <button class="bg-white text-blue-600 px-4 py-2 rounded-md font-medium text-sm hover:bg-gray-100 transition-all shadow-sm">
            Logout
        </button>
    </div>

    <div class="p-6 space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            
            <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-100 flex flex-col justify-between min-h-[140px]">
                <span class="text-sm font-bold text-gray-800 tracking-tight">Total Outstanding</span>
                <span class="text-4xl font-extrabold text-black mt-4" id="total-outstanding">Rp 0</span>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-100 flex flex-col justify-between min-h-[140px]">
                <span class="text-sm font-bold text-gray-800 tracking-tight">PAID</span>
                <span class="text-4xl font-extrabold text-black mt-4" id="total-paid">0 Unit</span>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-100 flex flex-col justify-between min-h-[140px]">
                <span class="text-sm font-bold text-gray-800 tracking-tight">On Proses</span>
                <span class="text-4xl font-extrabold text-black mt-4" id="total-on-proses">0 Unit</span>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-100 flex flex-col justify-between min-h-[140px]">
                <span class="text-sm font-bold text-gray-800 tracking-tight">Overdue</span>
                <span class="text-4xl font-extrabold text-red-600 mt-4" id="total-overdue">0 Unit</span>
            </div>

        </div>

        <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-4 flex items-center">
            <p class="text-xs font-bold uppercase tracking-wider text-amber-500 italic" id="status-update">Memuat data penagihan dari Supabase...</p>
        </div>

        <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-4 overflow-hidden">
            
            <div class="grid grid-cols-8 bg-[#2563eb] text-white rounded-lg text-center font-semibold text-xs shadow-sm overflow-hidden py-3">
                <div class="px-1">Customer Name</div>
                <div class="px-1">Salesman Name</div>
                <div class="px-1">O/S Balance</div>
                <div class="px-1">Material Code</div>
                <div class="px-1">Ket Cabang</div>
                <div class="px-1">Plan Bayar Leasing</div>
                <div class="px-1">Keterangan Leasing</div>
                <div class="px-1">Aksi</div>
            </div>
            
            <div id="tafs-table-body" class="divide-y divide-gray-100 max-h-[500px] overflow-y-auto mt-2">
                </div>

        </div>

    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const SUPABASE_URL = 'https://ahaoznkudusajtzfbnqj.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFoYW96bmt1ZHVzYWp0emZibnFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMzQ0NTEsImV4cCI6MjA5MDgxMDQ1MX0.RbMEdiLooCsDKefdXnM_0jse63_C4sl1tWQ5BfWVU1s';
        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

        window.cachedData = [];

        const fmtIDR = (v) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(v || 0);

        async function fetchTafsData() {
            try {
                const { data, error } = await supabase.from('ar_unit').select('*');
                if (error) throw error;

                if (data) {
                    window.cachedData = data;
                    
                    let tafsMetrics = { os: 0, paid: 0, onProses: 0, overdue: 0 };
                    let htmlRows = '';

                    data.forEach((d, i) => {
                        // SINKRONISASI NAMA FIELD SESUAI STRUKTUR ADMIN PUSAT
                        const leasing = String(d.leasing || d.leasing_name || d.Leasing || '').toUpperCase().trim();
                        
                        // Jalankan Filter Khusus Data TAFS
                        if (leasing.includes('TAFS')) {
                            const os = Number(d.os_balance || d.balance || 0);
                            const ov = Number(d.total_overdue || d.overdue || 0);
                            const statusTagih = String(d.status_tagih || d.status || d.Status || '').toUpperCase().trim();
                            
                            const customerName = d.customer_name || d.customer || '-';
                            const salesmanName = d.salesman_name || d.supervisor_name || 'OFFICE';
                            const materialCode = d.material_code || '-';
                            
                            // Field penampung catatan penagihan leasing
                            const ketCabang = d.keterangan_cabang || d.ket_cabang || '';
                            const planBayar = d.plan_bayar || d.plan_bayar_leasing || '';
                            const ketLeasing = d.keterangan_leasing || d.ket_leasing || '';

                            // Menentukan primary ID pencarian (Gunakan No atau id)
                            const idUtama = d.No || d.id || i;

                            // LOGIKA KALKULASI 4 CARD METRIK ATAS
                            if (statusTagih === 'SUDAH GI' || os === 0) {
                                tafsMetrics.paid++;
                            } else {
                                tafsMetrics.os += os;
                                if (ov > 0) {
                                    tafsMetrics.overdue++;
                                } else {
                                    tafsMetrics.onProses++;
                                }
                            }

                            // RENDER STRUKTUR ROW INTERAKTIF UNTUK INPUT LEASING
                            htmlRows += `
                            <div class="grid grid-cols-8 text-center py-3 text-xs font-bold uppercase text-gray-700 hover:bg-gray-50 items-center border-b border-gray-100">
                                <div class="truncate px-2 text-left font-black text-slate-800">${customerName}</div>
                                <div class="truncate px-1 text-slate-600">${salesmanName}</div>
                                <div class="text-blue-600 font-black">${fmtIDR(os)}</div>
                                <div class="text-gray-500 font-mono text-[11px]">${materialCode}</div>
                                <div class="px-1">
                                    <input type="text" id="cabang-${idUtama}" value="${ketCabang}" placeholder="Ket cabang..." class="w-full text-[11px] p-1.5 border border-gray-200 rounded-md bg-white font-medium focus:outline-none focus:border-blue-500">
                                </div>
                                <div class="px-1">
                                    <input type="text" id="plan-${idUtama}" value="${planBayar}" placeholder="Isi plan..." class="w-full text-[11px] p-1.5 border border-gray-200 rounded-md bg-white font-medium focus:outline-none focus:border-blue-500">
                                </div>
                                <div class="px-1">
                                    <input type="text" id="ket-${idUtama}" value="${ketLeasing}" placeholder="Isi keterangan..." class="w-full text-[11px] p-1.5 border border-gray-200 rounded-md bg-white font-medium focus:outline-none focus:border-blue-500">
                                </div>
                                <div class="text-center">
                                    <button onclick="simpanCatatanTafs('${idUtama}')" class="text-blue-600 hover:bg-blue-600 hover:text-white bg-blue-50 p-2 rounded-lg transition-all" title="Simpan Catatan">💾</button>
                                </div>
                            </div>`;
                        }
                    });

                    // TEMBAK HASIL PERHITUNGAN KE 4 METRIK ATAS
                    if(document.getElementById('total-outstanding')) document.getElementById('total-outstanding').innerText = fmtIDR(tafsMetrics.os);
                    if(document.getElementById('total-paid')) document.getElementById('total-paid').innerText = `${tafsMetrics.paid} Unit`;
                    if(document.getElementById('total-on-proses')) document.getElementById('total-on-proses').innerText = `${tafsMetrics.onProses} Unit`;
                    if(document.getElementById('total-overdue')) document.getElementById('total-overdue').innerText = `${tafsMetrics.overdue} Unit`;

                    // UPDATE TAMPILAN BARIS DATA TABEL LEASING
                    const tableBody = document.getElementById('tafs-table-body');
                    if(tableBody) {
                        tableBody.innerHTML = htmlRows ? htmlRows : '<div class="text-center py-8 text-gray-400 text-xs font-bold">TIDAK ADA DATA PIUTANG TAFS</div>';
                    }

                    if (document.getElementById('status-update')) {
                        document.getElementById('status-update').innerText = `KONEKSI SUKSES - DATA ADMIN TERINTEGRASI: ${new Date().toLocaleString('id-ID')} WIB`;
                        document.getElementById('status-update').className = "text-xs font-bold uppercase tracking-wider text-emerald-600 italic";
                    }
                }
            } catch (err) {
                console.error("Gagal sinkronisasi data TAFS:", err);
                if (document.getElementById('status-update')) {
                    document.getElementById('status-update').innerText = `KONEKSI BERMASALAH: ${err.message}`;
                    document.getElementById('status-update').className = "text-xs font-bold uppercase tracking-wider text-red-600 italic";
                }
            }
        }

        // FUNGSI AKSI: TEMBAK DATA UPDATE LANGSUNG KE TABEL ADMIN UTAMA (REALTIME)
        window.simpanCatatanTafs = async function(noId) {
            try {
                const valCabang = document.getElementById(`cabang-${noId}`).value;
                const valPlan = document.getElementById(`plan-${noId}`).value;
                const valKet = document.getElementById(`ket-${noId}`).value;

                // Cari row objek asli untuk validasi key kolom index tabel ('No' atau 'id')
                const rowAsli = window.cachedData.find(item => item.No == noId || item.id == noId);
                let targetKey = 'No';
                if (rowAsli && rowAsli.id !== undefined && rowAsli.No === undefined) {
                    targetKey = 'id';
                }

                // Payload disamakan 100% dengan kolom database Admin Pusat Bapak
                let payload = {};
                if (rowAsli) {
                    payload.keterangan_cabang = valCabang;
                    payload.plan_bayar = valPlan;
                    payload.keterangan_leasing = valKet;
                }

                // Eksekusi update data ke database Supabase pusat
                const { error } = await supabase
                    .from('ar_unit')
                    .update(payload)
                    .eq(targetKey, noId);

                if (error) throw error;
                
                alert("Catatan TAFS Berhasil Disimpan Langsung ke Admin Pusat! 👍");
                fetchTafsData(); 
            } catch (err) {
                console.error(err);
                alert("Gagal sinkronisasi ke Admin: " + err.message);
            }
        }

        document.addEventListener('DOMContentLoaded', fetchTafsData);
    </script>
</body>
</html>
